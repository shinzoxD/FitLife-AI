services:
  - type: web
    name: fitlife-ai-web
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: INTERNAL_API_HOSTPORT
        fromService:
          type: web
          name: fitlife-ai-api
          property: hostport
  - type: web
    name: fitlife-ai-api
    runtime: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: gunicorn gateway.app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
