name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key
      JWT_SECRET_KEY: ci-jwt-secret
      GROQ_API_KEY: ci-placeholder
      FRONTEND_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-space.txt
            requirements-render.txt

      - name: Install backend dependencies
        run: pip install -r requirements-space.txt

      - name: Smoke test gateway app factory
        run: python -c "from gateway.app import create_app; app = create_app(); print(app.name)"

      - name: Smoke test workout model loading
        run: python -c "from services.muscle_ai_service.core.models.yolo import get_yolo_models; models = get_yolo_models(); print(sorted(models.keys()))"

      - name: Print embedded workout metrics
        run: python scripts/evaluate_muscle_models.py
